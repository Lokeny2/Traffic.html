<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Light Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="timer-display">Next change in: <span id="seconds">15</span>s</div>

    <div id="instruction-box">
        <h2 id="status-title">STOP</h2>
        <p id="status-text">Drivers must remain behind the line.</p>
    </div>

    <div class="traffic-light">
        <div id="red" class="light red-on"></div>
        <div id="yellow" class="light"></div>
        <div id="green" class="light"></div>
    </div>
    
    <button id="changeBtn">Manual Cycle</button>

    <script src="script.js"></script>
</body>
</html>
